<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YPP — Batch Record</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { max-width: 480px; margin: 0 auto; padding: 24px 16px; font-family: Barlow, sans-serif; background: var(--color-bg, #f9fafb); }
    .brand { text-align: center; margin-bottom: 24px; }
    .brand-name { font-size: 1.2rem; font-weight: 700; color: var(--color-primary, #EA580C); }
    .brand-sub  { font-size: 0.8rem; color: #6b7280; margin-top: 2px; }
    .batch-no   { font-size: 1.4rem; font-weight: 700; color: var(--color-primary, #EA580C); text-align: center; margin: 8px 0 20px; }
    .info-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .info-table td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    .info-table td:first-child { font-weight: 600; width: 45%; color: #6b7280; }
    .info-table tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 0.78rem; font-weight: 600; }
    .badge-ok      { background: #d1fae5; color: #065f46; }
    .badge-ng      { background: #fee2e2; color: #991b1b; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .qr-wrap  { text-align: center; margin: 20px 0; }
    .qr-label { margin-top: 8px; font-size: 0.75rem; color: #6b7280; word-break: break-all; }
    .print-btn { display: block; margin: 0 auto; padding: 10px 28px; background: var(--color-primary, #EA580C); color: #fff; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .not-found { text-align: center; padding: 48px 16px; color: #6b7280; }
    .not-found strong { display: block; font-size: 1.1rem; margin-bottom: 8px; color: #374151; }
    .section-heading { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #6b7280; margin: 20px 0 8px; }
    @media print {
      .no-print { display: none !important; }
      body { padding: 0; background: #fff; box-shadow: none; }
      .info-table { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="brand no-print">
    <div class="brand-name">Yash Poly Pack</div>
    <div class="brand-sub">Batch Traceability Record</div>
  </div>

  <div id="content">
    <p style="text-align:center;color:#6b7280;padding:48px 0;">Loading…</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/batch.js"></script>
</body>
</html>
