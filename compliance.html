<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1565C0">
  <title>YPP ERP — Compliance</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Tab Bar ── */
    .comp-tabs {
      display: flex;
      gap: 4px;
      padding: 12px 16px 0;
      background: var(--white);
      border-bottom: 1px solid var(--grey-border);
    }
    .comp-tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border: none;
      border-radius: 20px;
      background: var(--grey-bg);
      color: var(--grey-text);
      font-size: 0.8rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .comp-tab.active { background: var(--blue); color: var(--white); }

    /* ── Content ── */
    .comp-content {
      position: relative;
      flex: 1;
      overflow: hidden;
    }
    .comp-panel {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 16px;
      background: var(--grey-bg);
      transition: transform 0.25s ease;
    }
    .comp-panel.slide-out { transform: translateX(-100%); }
    .comp-panel.hidden { display: none; }

    /* ── Table ── */
    .comp-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      font-size: 0.85rem;
    }
    .comp-table th {
      background: var(--blue);
      color: var(--white);
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }
    .comp-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--grey-border);
      vertical-align: top;
    }
    .comp-table tbody tr:last-child td { border-bottom: none; }
    .comp-table tbody tr:hover { background: var(--grey-bg); }
    .desc-cell { max-width: 220px; }

    /* ── Chips ── */
    .chip {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .chip-red    { background: #FFEBEE; color: #C62828; }
    .chip-yellow { background: #FFF8E1; color: #F57F17; }
    .chip-green  { background: #E8F5E9; color: #2E7D32; }
    .chip-blue   { background: #E3F2FD; color: #1565C0; }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
    }
    .capa-filter-btn {
      padding: 6px 14px;
      border: 1px solid var(--grey-border);
      border-radius: 20px;
      background: var(--white);
      color: var(--grey-text);
      font-size: 0.8rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
    }
    .capa-filter-btn.active { background: var(--blue); color: var(--white); border-color: var(--blue); }

    /* ── FAB / Add Button ── */
    .add-capa-btn {
      margin-left: auto;
      padding: 7px 16px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
    }

    /* ── Slide-in Form Panel ── */
    .capa-form-panel {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      background: var(--white);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 10;
    }
    .capa-form-panel.slide-in { transform: translateX(0); }
    .form-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--grey-border);
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .form-title { font-weight: 700; font-size: 1rem; }
    .form-body { padding: 16px; }
    .field-group { margin-bottom: 16px; }
    .field-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--grey-text); margin-bottom: 5px; }
    .field-group input,
    .field-group select,
    .field-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--grey-border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: var(--font);
      background: var(--grey-bg);
      box-sizing: border-box;
    }
    .field-group textarea { min-height: 80px; resize: vertical; }
    .field-group input:focus,
    .field-group select:focus,
    .field-group textarea:focus { outline: 2px solid var(--blue); }
    .form-actions { padding: 16px; border-top: 1px solid var(--grey-border); display: flex; gap: 10px; }
    .btn-primary {
      flex: 1;
      padding: 12px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
    }
    .btn-secondary {
      padding: 12px 20px;
      background: var(--grey-bg);
      color: var(--grey-text);
      border: 1px solid var(--grey-border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: var(--font);
      cursor: pointer;
    }
    .btn-close-capa {
      padding: 4px 10px;
      font-size: 0.75rem;
      background: #E8F5E9;
      color: #2E7D32;
      border: 1px solid #A5D6A7;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--font);
      font-weight: 600;
      white-space: nowrap;
    }
    .empty-msg { padding: 24px 16px; color: var(--grey-text); text-align: center; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="back-btn" id="back-to-app" style="color:#fff;font-size:1.1rem;">←</button>
      <span class="header-title">Compliance</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <!-- Tab Bar -->
  <div class="comp-tabs">
    <button class="comp-tab active" id="tab-legal">Legal Register</button>
    <button class="comp-tab" id="tab-capa">CAPA Log</button>
  </div>

  <!-- Content Area -->
  <div class="comp-content">

    <!-- Legal Register Panel -->
    <div class="comp-panel" id="panel-legal">
      <div id="legal-table-wrap"><div class="empty-msg">Loading…</div></div>
    </div>

    <!-- CAPA Log Panel -->
    <div class="comp-panel hidden" id="panel-capa">
      <div class="filter-bar">
        <button class="capa-filter-btn active" data-status="all">All</button>
        <button class="capa-filter-btn" data-status="Open">Open</button>
        <button class="capa-filter-btn" data-status="Closed">Closed</button>
        <button class="add-capa-btn" onclick="Compliance.openCapaForm()">+ New CAPA</button>
      </div>
      <div id="capa-table-wrap"><div class="empty-msg">Loading…</div></div>
    </div>

    <!-- CAPA Slide-in Form -->
    <div class="capa-form-panel" id="capa-form-panel">
      <div class="form-header">
        <button class="back-btn" onclick="Compliance.closeCapaForm()">← Back</button>
        <span class="form-title">New CAPA</span>
      </div>
      <div class="form-body">
        <div class="field-group">
          <label>Source</label>
          <select id="capa-form-source">
            <option value="">— select —</option>
            <option value="Customer Complaint">Customer Complaint</option>
            <option value="Internal Audit">Internal Audit</option>
            <option value="Quality NG">Quality NG</option>
            <option value="Supplier Issue">Supplier Issue</option>
          </select>
        </div>
        <div class="field-group">
          <label>Description</label>
          <textarea id="capa-form-description" placeholder="Describe the problem…"></textarea>
        </div>
        <div class="field-group">
          <label>Root Cause</label>
          <textarea id="capa-form-root-cause" placeholder="Root cause analysis…"></textarea>
        </div>
        <div class="field-group">
          <label>Action Plan</label>
          <textarea id="capa-form-action" placeholder="Corrective / preventive actions…"></textarea>
        </div>
        <div class="field-group">
          <label>Target Date</label>
          <input type="date" id="capa-form-target-date">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="Compliance.closeCapaForm()">Cancel</button>
        <button class="btn-primary" onclick="Compliance.submitCapa()">Save CAPA</button>
      </div>
    </div>

  </div>

  <!-- Spinner -->
  <div class="spinner-overlay hidden" id="spinner">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/compliance.js"></script>
  <script>
    (async () => {
      await Api.init();
      await Compliance.init();
      document.querySelectorAll('.capa-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => Compliance.loadCapa(btn.dataset.status));
      });
    })();
  </script>
</body>
</html>
