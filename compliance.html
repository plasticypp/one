<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#EA580C">
  <title>YPP ERP — Compliance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/masters.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-flex">
      <button class="back-btn" id="back-to-app"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="header-title" data-i18n="page.compliance">Compliance</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <!-- Tab Bar -->
  <div class="sub-tab-bar">
    <button class="sub-tab active" id="tab-legal">Legal Register</button>
    <button class="sub-tab" id="tab-capa">CAPA Log</button>
  </div>

  <!-- Content Area -->
  <div class="comp-content">

    <!-- Legal Register Panel -->
    <div class="comp-panel" id="panel-legal">
      <div class="filter-bar" style="justify-content:flex-end;">
        <button class="add-capa-btn" id="btn-new-legal" onclick="Compliance.openLegalForm()">+ New Regulation</button>
      </div>
      <div id="legal-table-wrap"><div class="empty-msg">Loading…</div></div>
    </div>

    <!-- CAPA Log Panel -->
    <div class="comp-panel hidden" id="panel-capa">
      <div class="filter-bar">
        <button class="capa-filter-btn active" data-status="all">All</button>
        <button class="capa-filter-btn" data-status="Open">Open</button>
        <button class="capa-filter-btn" data-status="Closed">Closed</button>
        <button class="add-capa-btn" onclick="Compliance.openCapaForm()">+ New CAPA</button>
      </div>
      <div id="capa-table-wrap"><div class="empty-msg">Loading…</div></div>
    </div>

    <!-- CAPA Slide-in Form -->
    <div class="capa-form-panel" id="capa-form-panel">
      <div class="form-header">
        <button class="back-btn" onclick="Compliance.closeCapaForm()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <span class="form-title">New CAPA</span>
      </div>
      <div class="form-body">
        <div class="field-group">
          <label>Source</label>
          <select id="capa-form-source">
            <option value="">— select —</option>
            <option value="Customer Complaint">Customer Complaint</option>
            <option value="Internal Audit">Internal Audit</option>
            <option value="Quality NG">Quality NG</option>
            <option value="Supplier Issue">Supplier Issue</option>
          </select>
        </div>
        <div class="field-group">
          <label>Description</label>
          <textarea id="capa-form-description" placeholder="Describe the problem…"></textarea>
        </div>
        <div class="field-group">
          <label>Root Cause</label>
          <textarea id="capa-form-root-cause" placeholder="Root cause analysis…"></textarea>
        </div>
        <div class="field-group">
          <label>Action Plan</label>
          <textarea id="capa-form-action" placeholder="Corrective / preventive actions…"></textarea>
        </div>
        <div class="field-group">
          <label>Corrective Action</label>
          <textarea id="capa-form-corrective-action" placeholder="Corrective actions…"></textarea>
        </div>
        <div class="field-group">
          <label>Preventive Action</label>
          <textarea id="capa-form-preventive-action" placeholder="Preventive actions…"></textarea>
        </div>
        <div class="field-group">
          <label>NCR Ref</label>
          <input type="text" id="capa-form-ncr-ref" placeholder="Optional NCR reference">
        </div>
        <div class="field-group">
          <label>Responsible</label>
          <select id="capa-form-responsible">
            <option value="">— select responsible person —</option>
          </select>
        </div>
        <div class="field-group">
          <label>Target Date</label>
          <input type="date" id="capa-form-target-date">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="Compliance.closeCapaForm()">Cancel</button>
        <button class="btn-primary" onclick="Compliance.submitCapa()">Save CAPA</button>
      </div>
    </div>

    <!-- Legal Register Form Panel -->
    <div class="capa-form-panel" id="legal-form-panel">
      <div class="form-header">
        <button class="back-btn" id="legal-form-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <span class="form-title" id="legal-form-title">New Legal Entry</span>
      </div>
      <div class="form-body">
        <div class="field-group"><label>Act / Regulation *</label><input type="text" id="lf-act" required></div>
        <div class="field-group"><label>Requirement</label><input type="text" id="lf-req"></div>
        <div class="field-group"><label>Applicability</label><input type="text" id="lf-applicability"></div>
        <div class="field-group">
          <label>Compliance Status</label>
          <select id="lf-status"><option>Compliant</option><option>Due Soon</option><option>Non-Compliant</option><option>Pending</option></select>
        </div>
        <div class="field-group"><label>Last Review Date</label><input type="date" id="lf-last-review"></div>
        <div class="field-group"><label>Next Review Date *</label><input type="date" id="lf-next-review" required></div>
        <div class="field-group"><label>Remarks</label><textarea id="lf-remarks" rows="2"></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="Compliance.submitLegalEntry()">Save</button>
      </div>
    </div>

    <!-- CAPA Detail Panel -->
    <div class="capa-form-panel" id="capa-detail-panel">
      <div class="form-header">
        <button class="back-btn" id="capa-detail-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <span class="form-title">CAPA Detail</span>
      </div>
      <div class="form-body" id="capa-detail-body"></div>
      <div class="form-actions" id="capa-detail-actions"></div>
    </div>

  </div>

  <!-- Spinner -->
  <div class="spinner-overlay hidden" id="spinner">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/lang.js" defer></script>
  <script src="js/compliance.js" defer></script>
  <script>
  window.addEventListener('DOMContentLoaded', () => {
    (async () => {
      await Api.init();
      await Compliance.init();
      document.querySelectorAll('.capa-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => Compliance.loadCapa(btn.dataset.status));
      });
    })();
  });
  </script>
</body>
</html>
