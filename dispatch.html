<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#EA580C">
  <title>YPP ERP — Dispatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/masters.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-flex">
      <button class="back-btn" id="back-to-app"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="header-title" data-i18n="page.dispatch">Dispatch</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <!-- Tab Bar -->
  <div class="sub-tab-bar">
    <button class="sub-tab active" data-tab="so">Sales Orders</button>
    <button class="sub-tab" data-tab="log">Dispatch Log</button>
  </div>

  <!-- Main Content -->
  <div id="main-content">

    <!-- Sales Orders Tab -->
    <div id="tab-so" class="tab-content">
      <div class="filter-bar">
        <select id="filter-status" onchange="Dispatch.loadSOList()">
          <option value="all">All</option>
          <option value="Pending">Pending</option>
          <option value="Partial">Partial</option>
          <option value="Dispatched">Dispatched</option>
        </select>
        <button class="btn-apply" onclick="Dispatch.loadSOList()">Apply</button>
        <span class="filter-spacer"></span>
        <button class="btn-primary" id="btn-new-so">+ New SO</button>
      </div>
      <div class="so-table-wrap">
        <table class="so-table">
          <thead>
            <tr>
              <th>SO ID</th>
              <th>Date</th>
              <th>Customer</th>
              <th>Product</th>
              <th>Qty Ordered</th>
              <th>Qty Dispatched</th>
              <th>Remaining</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="so-tbody">
            <tr><td colspan="9" class="td-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Dispatch Log Tab -->
    <div id="tab-log" class="tab-content hidden">
      <div class="so-table-wrap" style="padding-top:12px;">
        <table class="so-table">
          <thead>
            <tr>
              <th>Dispatch ID</th>
              <th>SO ID</th>
              <th>Date</th>
              <th>Qty</th>
              <th>Vehicle No</th>
              <th>Driver</th>
            </tr>
          </thead>
          <tbody id="dispatch-tbody">
            <tr><td colspan="6" class="td-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Form Panel (slide-in) -->
  <div class="form-panel" id="form-panel">
    <div class="form-header">
      <button class="back-btn" id="form-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="form-title" id="form-title">New Sales Order</span>
    </div>
    <div class="form-body">
      <div class="field-group">
        <label>Date</label>
        <input type="date" id="field-date">
      </div>
      <div class="field-group">
        <label>Customer</label>
        <select id="field-customer"><option value="">— select —</option></select>
      </div>
      <div class="field-group">
        <label>Product</label>
        <select id="field-product"><option value="">— select —</option></select>
      </div>
      <div class="field-group">
        <label>Qty Ordered</label>
        <input type="number" id="field-qty-ordered" min="1" step="1">
      </div>
      <div class="field-group">
        <label>Invoice No</label>
        <input type="text" id="field-invoice">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="Dispatch.submitSO()">Save SO</button>
    </div>
  </div>

  <!-- Dispatch Action Panel (slide-in) -->
  <div class="form-panel" id="dispatch-panel">
    <div class="form-header">
      <button class="back-btn" id="dispatch-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="form-title">Dispatch Sales Order</span>
    </div>
    <div class="form-body">
      <div class="field-group"><label>SO ID</label><input type="text" id="dp-so-id" disabled></div>
      <div class="field-group"><label>Customer</label><input type="text" id="dp-customer" disabled></div>
      <div class="field-group"><label>Product</label><input type="text" id="dp-product" disabled></div>
      <div class="field-group"><label>Ordered Qty</label><input type="number" id="dp-ordered" disabled></div>
      <div class="field-group"><label>Already Dispatched</label><input type="number" id="dp-already" disabled></div>
      <div class="field-group"><label>Qty to Dispatch *</label><input type="number" id="dp-qty" min="1" required></div>
      <div class="field-group"><label>Dispatch Date *</label><input type="date" id="dp-date" required></div>
      <div class="field-group"><label>Vehicle No</label><input type="text" id="dp-vehicle" placeholder="e.g. MH04-AB-1234"></div>
      <div class="field-group"><label>Driver Name</label><input type="text" id="dp-driver"></div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="Dispatch.submitDispatch()">Confirm Dispatch</button>
    </div>
  </div>

  <!-- Dispatch Action Panel -->
  <div id="dispatch-action-panel" class="form-panel">
    <div class="form-header">
      <button class="back-btn" id="dispatch-action-back-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="form-title">Dispatch Sales Order</span>
    </div>
    <div class="form-body">
      <input type="hidden" id="dispatch-so-id">
      <div class="field-group">
        <label>SO #</label>
        <input type="text" id="dispatch-so-display" disabled>
      </div>
      <div class="field-group">
        <label>Customer</label>
        <input type="text" id="dispatch-customer-display" disabled>
      </div>
      <div class="field-group">
        <label>Product</label>
        <input type="text" id="dispatch-product-display" disabled>
      </div>
      <div class="field-group">
        <label>SO Qty Ordered</label>
        <input type="number" id="dispatch-so-qty-display" disabled>
      </div>
      <div class="field-group">
        <label>Dispatch Qty *</label>
        <input type="number" id="dispatch-qty" placeholder="Qty to dispatch" min="1">
        <div class="field-error" id="err-dispatch-qty"></div>
      </div>
      <div class="field-group">
        <label>Invoice No</label>
        <input type="text" id="dispatch-invoice" placeholder="e.g. INV-2024-001">
      </div>
      <div class="field-group">
        <label>Dispatch Date *</label>
        <input type="date" id="dispatch-date">
        <div class="field-error" id="err-dispatch-date"></div>
      </div>
      <div class="field-group">
        <label>Vehicle / LR No</label>
        <input type="text" id="dispatch-vehicle" placeholder="Optional">
      </div>
      <div class="field-group">
        <label>Driver Name</label>
        <input type="text" id="dispatch-driver-name" placeholder="Optional">
      </div>
      <div class="field-group">
        <label>Batch No</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="text" id="dispatch-batch-no" placeholder="Select or type batch" style="flex:1;">
          <button class="btn btn-secondary btn-sm" onclick="Dispatch.openBatchSelectPanel()" type="button">Browse</button>
        </div>
      </div>
      <div class="field-group">
        <label>Polybag Qty</label>
        <input type="number" id="dispatch-polybag-qty" placeholder="e.g. 6" min="0">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary btn-full" onclick="submitDispatchAction()">Confirm Dispatch</button>
    </div>
  </div>

  <!-- Plan Batch Panel -->
  <div id="plan-batch-panel" class="form-panel" style="z-index:250;">
    <div class="form-header">
      <button class="back-btn" onclick="Dispatch.slidePlanBatchPanelOut()" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="form-title">Plan Batch Order</span>
    </div>
    <div class="form-body">
      <div class="field-group"><label>Sales Order</label><input type="text" id="plan-so-display" disabled></div>
      <div class="field-group"><label>Product</label><input type="text" id="plan-product-display" disabled></div>
      <div class="field-group">
        <label>Machine *</label>
        <select id="plan-machine"><option value="">— select machine —</option></select>
      </div>
      <div class="field-group">
        <label>Planned Qty *</label>
        <input type="number" id="plan-qty" min="1">
      </div>
      <div class="field-group">
        <label>Planned Date</label>
        <input type="date" id="plan-date">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary btn-full" onclick="Dispatch.submitPlanBatch()">Create Batch Order</button>
    </div>
  </div>

  <!-- Batch Select Panel -->
  <div id="batch-select-panel" class="form-panel" style="z-index:300;">
    <div class="form-header">
      <button class="back-btn" onclick="document.getElementById('batch-select-panel').classList.remove('slide-in')" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="form-title">Select Batch</span>
    </div>
    <div class="form-body">
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Batch No</th><th>Product</th><th>Date</th><th></th></tr></thead>
          <tbody id="batch-select-tbody">
            <tr><td colspan="4" class="text-center text-muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Detail Panel (slide-in) -->
  <div class="form-panel" id="detail-panel">
    <div class="form-header">
      <button class="back-btn" id="detail-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="form-title" id="detail-title">SO Detail</span>
    </div>
    <div class="form-body" id="detail-body"></div>
    <div class="form-actions" id="detail-actions"></div>
  </div>

  <!-- Spinner -->
  <div class="spinner-overlay hidden" id="spinner">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/lang.js" defer></script>
  <script src="js/dispatch.js" defer></script>
  <script>
  window.addEventListener('DOMContentLoaded', () => {
    (async () => {
      await Api.init();
      await Dispatch.init();
    })();
  });
  </script>
</body>
</html>
