<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#EA580C">
  <title>YPP ERP — Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/masters.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="flex items-center gap-3">
      <button class="back-btn" id="back-to-app" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="header-title" data-i18n="nav.grn">Inventory / GRN</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <!-- Sub-tab bar -->
  <div class="sub-tab-bar" style="margin-top:56px;">
    <button class="sub-tab active" data-pane="history">GRN History</button>
    <button class="sub-tab" data-pane="stock">Stock Levels</button>
    <button class="sub-tab" data-pane="reorder">Reorder</button>
  </div>

  <!-- GRN History pane -->
  <div id="pane-history" class="tab-pane active">
    <div class="filter-bar">
      <select id="filter-supplier">
        <option value="">All Suppliers</option>
      </select>
      <span class="filter-spacer"></span>
      <button class="btn btn-primary btn-sm" id="btn-new-grn">+ New GRN</button>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>GRN ID</th>
            <th>Date</th>
            <th>Supplier</th>
            <th>Material</th>
            <th>Qty (kg)</th>
            <th>Lot No</th>
          </tr>
        </thead>
        <tbody id="grn-tbody">
          <tr><td colspan="6" class="text-center text-muted" style="padding:var(--space-8);">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Stock Levels pane -->
  <div id="pane-stock" class="tab-pane" style="padding:var(--space-4);">
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Material</th>
            <th>Received (kg)</th>
            <th>Consumed (kg)</th>
            <th>Current Stock</th>
          </tr>
        </thead>
        <tbody id="stock-tbody">
          <tr><td colspan="4" class="text-center text-muted" style="padding:var(--space-8);">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Reorder Requests pane -->
  <div id="pane-reorder" class="tab-pane" style="padding:var(--space-4);">
    <div class="filter-bar" style="margin-bottom:var(--space-3);">
      <select id="filter-rr-status">
        <option value="all">All</option>
        <option value="Open">Open</option>
        <option value="Ordered">Ordered</option>
      </select>
      <button class="btn btn-sm" onclick="GRN.loadReorderList()">Apply</button>
      <span class="filter-spacer"></span>
      <button class="btn btn-primary btn-sm" onclick="GRN.openReorderForm()">+ New Request</button>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>RR ID</th><th>Date</th><th>Material</th><th>Supplier</th><th>Qty (kg)</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody id="rr-tbody">
          <tr><td colspan="7" class="text-center text-muted" style="padding:var(--space-8);">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Reorder Form Panel -->
  <div class="form-panel" id="rr-form-panel">
    <div class="form-header">
      <button class="back-btn" onclick="GRN.closeReorderForm()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="form-title">New Reorder Request</span>
    </div>
    <div class="form-body">
      <div class="field-group">
        <label>Material *</label>
        <input type="text" id="rr-material" placeholder="e.g. HDPE Resin">
      </div>
      <div class="field-group">
        <label>Supplier</label>
        <select id="rr-supplier"><option value="">— select supplier —</option></select>
      </div>
      <div class="field-group">
        <label>Qty Required (kg) *</label>
        <input type="number" id="rr-qty" min="1" step="any">
      </div>
      <div class="field-group">
        <label>Notes</label>
        <input type="text" id="rr-notes" placeholder="Urgency, delivery instructions…">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary btn-full" onclick="GRN.submitReorderRequest()">Submit Request</button>
    </div>
  </div>

  <!-- Form Panel -->
  <div class="form-panel" id="form-panel">
    <div class="form-header">
      <button class="back-btn" id="form-back" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="form-title">New GRN</span>
    </div>
    <div class="form-body">
      <div class="field-group">
        <label for="field-date">Date</label>
        <input type="date" id="field-date">
      </div>
      <div class="field-group">
        <label for="field-supplier">Supplier</label>
        <select id="field-supplier"><option value="">— select supplier —</option></select>
      </div>
      <div class="field-group">
        <label for="field-material">Material</label>
        <input type="text" id="field-material" placeholder="e.g. HDPE Resin">
      </div>
      <div class="field-group">
        <label for="field-qty-kg">Qty Received (kg) *</label>
        <input type="number" id="field-qty-kg" min="0" step="any" inputmode="decimal">
        <div class="field-error" id="err-qty-kg"></div>
      </div>
      <div class="field-group">
        <label for="field-lot-no">Lot No</label>
        <input type="text" id="field-lot-no" placeholder="Supplier lot number">
      </div>
    </div>
    <div class="form-actions">
      <div class="field-error" id="form-error"></div>
      <button class="btn btn-primary btn-full btn-lg" id="btn-save-grn">Save GRN</button>
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="form-panel" id="detail-panel">
    <div class="form-header">
      <button class="back-btn" id="detail-back" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="form-title">GRN Detail</span>
    </div>
    <div class="form-body" id="detail-body"></div>
    <div class="form-actions" id="detail-actions"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Spinner -->
  <div class="spinner-overlay hidden" id="spinner"><div class="spinner"></div></div>

  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/lang.js" defer></script>
  <script src="js/grn.js" defer></script>
  <script>
    window.showToast = function(msg, type, duration = 2500) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (type ? ' ' + type : '') + ' show';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.className = 'toast'; }, duration);
    };

    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.sub-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('pane-' + btn.dataset.pane).classList.add('active');
          if (btn.dataset.pane === 'stock') GRN.loadStockLevels();
          if (btn.dataset.pane === 'reorder') GRN.loadReorderList();
        });
      });

      document.getElementById('back-to-app').addEventListener('click', () => window.location.href = 'app.html');

      (async () => {
        await Api.init();
        await GRN.init();
      })();
    });
  </script>
</body>
</html>
