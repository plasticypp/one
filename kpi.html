<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#EA580C">
  <title>YPP ERP — KPI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/masters.css">
</head>
<body>

  <header class="header">
    <div class="header-flex">
      <button class="back-btn" id="back-to-app">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="header-title">KPI Dashboard</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <div id="kpi-content" style="padding:var(--space-4);">

    <!-- Live counters from getDashboardStats -->
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-3);margin-bottom:var(--space-5);" id="stat-grid">
      <!-- populated by JS -->
    </div>

    <div class="empty-msg" style="margin-top:var(--space-4);">
      <p style="font-size:var(--text-base);font-weight:var(--weight-bold);margin-bottom:var(--space-2);">Full KPI Dashboard</p>
      <p style="color:var(--color-text-muted);font-size:var(--text-sm);">OEE, downtime Pareto, scrap rate, on-time dispatch %, MTBF/MTTR — coming in Wave 1 KPI expansion.</p>
    </div>
  </div>

  <div class="spinner-overlay hidden" id="spinner"><div class="spinner"></div></div>
  <div class="toast" id="toast"></div>

  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/lang.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const session = Auth.get();
      if (!session) { Auth.requireLogin(); return; }
      document.getElementById('back-to-app').addEventListener('click', () => window.location.href = 'app.html');
      document.getElementById('lang-toggle').textContent = (session.lang || 'en').toUpperCase();

      document.getElementById('spinner').classList.remove('hidden');
      try {
        await Api.init();
        const res = await Api.get('getDashboardStats');
        if (res && res.success) renderStats(res.data);
      } finally {
        document.getElementById('spinner').classList.add('hidden');
      }
    });

    function renderStats(d) {
      const items = [
        { label: 'Active Batches',      value: d.activeBatches,      color: '#EA580C' },
        { label: 'Open Breakdowns',     value: d.openBreakdowns,     color: d.openBreakdowns > 0 ? '#dc2626' : '#16a34a' },
        { label: 'Open CAPAs',          value: d.openCapas,          color: d.openCapas > 0 ? '#d97706' : '#16a34a' },
        { label: 'Overdue Compliance',  value: d.overdueCompliance,  color: d.overdueCompliance > 0 ? '#dc2626' : '#16a34a' },
        { label: 'Low Stock Items',     value: d.lowStockCount,      color: d.lowStockCount > 0 ? '#d97706' : '#16a34a' },
        { label: 'Overdue PMs',         value: d.overduePMs,         color: d.overduePMs > 0 ? '#d97706' : '#16a34a' },
        { label: 'Pending GRNs',        value: d.openGRNs,           color: '#6b7280' },
      ];
      const grid = document.getElementById('stat-grid');
      grid.innerHTML = items.map(i => `
        <div style="background:var(--color-surface);border-radius:var(--radius-md);padding:var(--space-4);border-left:4px solid ${i.color};">
          <div style="font-size:2rem;font-weight:700;color:${i.color};line-height:1;">${i.value ?? '—'}</div>
          <div style="font-size:var(--text-xs);color:var(--color-text-muted);margin-top:var(--space-1);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;">${i.label}</div>
        </div>`).join('');
    }
  </script>
</body>
</html>
