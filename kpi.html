<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#EA580C">
  <title>YPP ERP — KPI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/masters.css">
</head>
<body>

  <header class="header">
    <div class="header-flex">
      <button class="back-btn" id="back-to-app">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="header-title">KPI Dashboard</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <!-- List Panel -->
  <div class="list-panel" id="kpi-list-panel">

    <div style="padding:var(--space-4);">

      <!-- Stats grid -->
      <div class="stat-grid" id="stat-grid"></div>

      <!-- KPI Log section -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3);">
        <span style="font-weight:600;font-size:var(--text-base);">KPI Log</span>
        <button class="add-btn" id="log-kpi-btn">+ Log Entry</button>
      </div>

      <div class="filter-bar" style="margin-bottom:var(--space-3);">
        <label>KPI</label>
        <select id="kpi-filter">
          <option value="all">All KPIs</option>
        </select>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>KPI</th>
              <th>Value</th>
              <th>Target</th>
              <th>Period</th>
              <th>By</th>
            </tr>
          </thead>
          <tbody id="kpi-log-tbody">
            <tr><td colspan="6" class="td-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Log Entry Form Panel -->
  <div class="form-panel" id="kpi-form-panel">
    <div class="form-header">
      <button class="back-btn" id="kpi-form-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="form-title">Log KPI Entry</span>
    </div>
    <div class="form-body">
      <div class="field-group">
        <label>KPI</label>
        <select id="kf-kpi-code"><option value="">— select KPI —</option></select>
      </div>
      <div class="field-group">
        <label>Value</label>
        <input type="number" id="kf-value" placeholder="e.g. 2.4" step="0.01">
      </div>
      <div class="field-group">
        <label>Period (YYYY-MM)</label>
        <input type="month" id="kf-period">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="kpi-submit-btn">Save</button>
    </div>
  </div>

  <div class="spinner-overlay hidden" id="spinner"><div class="spinner"></div></div>
  <div class="toast" id="toast"></div>

  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/lang.js" defer></script>
  <script src="js/kpi.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      await Api.init();
      await KPI.init();
      // Populate the filter dropdown after KB is loaded
      const kbRes = await Api.get('getKPIsKB');
      if (kbRes && kbRes.success) {
        const sel = document.getElementById('kpi-filter');
        kbRes.data.forEach(k => {
          const opt = document.createElement('option');
          opt.value = k.id;
          opt.textContent = k.name;
          sel.appendChild(opt);
        });
      }
    });
  </script>
</body>
</html>
