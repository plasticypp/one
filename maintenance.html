<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#EA580C">
  <title>YPP ERP — Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/masters.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-flex">
      <button class="back-btn" id="back-to-app"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="header-title" data-i18n="page.maintenance">Maintenance</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <!-- Module Tabs -->
  <div class="sub-tab-bar">
    <button class="sub-tab active" data-tab="breakdowns">Breakdowns</button>
    <button class="sub-tab" data-tab="pm">PM Schedule</button>
  </div>

  <!-- Content Area -->
  <div class="masters-content">

    <!-- List Panel -->
    <div class="list-panel" id="list-panel">

      <!-- Breakdowns Tab -->
      <div id="tab-breakdowns" class="tab-panel">
        <div class="filter-bar">
          <label>Status</label>
          <select id="status-filter">
            <option value="all">All</option>
            <option value="Open">Open</option>
            <option value="Closed">Closed</option>
          </select>
          <button class="add-btn" id="log-btn">+ Log Breakdown</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>BD ID</th>
                <th>Date</th>
                <th>Machine</th>
                <th>Code</th>
                <th>Description</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="breakdown-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- PM Schedule Tab -->
      <div id="tab-pm" class="tab-panel hidden">
        <div class="table-wrap" style="padding:0;">
          <table class="data-table">
            <thead>
              <tr>
                <th>PM ID</th>
                <th>Equipment</th>
                <th>Task</th>
                <th>Freq (days)</th>
                <th>Last Done</th>
                <th>Next Due</th>
                <th>Assigned To</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="pm-tbody"></tbody>
          </table>
        </div>
        <div class="pm-legend">
          <span><span class="pm-legend-dot overdue"></span>Overdue</span>
          <span><span class="pm-legend-dot upcoming"></span>Due within 7 days</span>
        </div>
      </div>

    </div>

    <!-- Form Panel -->
    <div class="form-panel" id="form-panel">
      <div class="form-header">
        <button class="back-btn" id="form-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <span class="form-title" id="form-title"></span>
      </div>
      <div class="form-body" id="form-body"></div>
      <div class="form-actions" id="form-actions"></div>
    </div>

  </div>

  <!-- Resolve Breakdown Panel -->
  <div id="resolve-panel" class="form-panel">
    <div class="form-panel-header">
      <button class="back-btn" id="resolve-back-btn" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h2 class="form-panel-title">Resolve Breakdown</h2>
    </div>
    <div class="form-panel-body">
      <input type="hidden" id="resolve-bd-id">
      <div class="form-group">
        <label class="form-label">Breakdown ID</label>
        <input type="text" id="resolve-bd-display" class="form-input" readonly>
      </div>
      <div class="form-group">
        <label class="form-label">Equipment</label>
        <input type="text" id="resolve-equipment-display" class="form-input" readonly>
      </div>
      <div class="form-group">
        <label class="form-label">Resolution Notes *</label>
        <textarea id="resolve-notes" class="form-input" rows="3" placeholder="Describe what was done to fix the issue" required></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Resolved By *</label>
        <input type="text" id="resolve-by" class="form-input" placeholder="Name of technician" required>
      </div>
      <div class="form-group">
        <label class="form-label">Resolved Date *</label>
        <input type="date" id="resolve-date" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">Spare Parts Used</label>
        <input type="text" id="resolve-spares" class="form-input" placeholder="Optional — list parts replaced">
      </div>
      <div class="form-group">
        <label class="form-label">Downtime (hours)</label>
        <input type="number" id="resolve-downtime" class="form-input" placeholder="Optional" min="0" step="0.5">
      </div>
      <button class="btn btn-primary btn-full" onclick="submitResolve()">Mark as Resolved</button>
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="form-panel" id="detail-panel">
    <div class="form-header">
      <button class="back-btn" id="detail-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="form-title">Breakdown Detail</span>
    </div>
    <div class="form-body" id="detail-body"></div>
    <div class="form-actions" id="detail-actions"></div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab">+</button>

  <!-- Spinner -->
  <div class="spinner-overlay hidden" id="spinner">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/lang.js" defer></script>
  <script src="js/maintenance.js" defer></script>
  <script>
  window.addEventListener('DOMContentLoaded', () => {
    (async () => {
      await Api.init();
      await Maintenance.init();

      document.getElementById('status-filter').addEventListener('change', async e => {
        await Maintenance._loadBreakdowns(e.target.value);
      });
      document.getElementById('log-btn').addEventListener('click', () => {
        document.getElementById('fab').click();
      });
    })();
  });
  </script>
</body>
</html>
