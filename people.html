<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#EA580C">
  <title>YPP ERP — People & Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/masters.css">
</head>
<body>

  <header class="header">
    <div class="header-flex">
      <button class="back-btn" id="back-to-app">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="header-title">People &amp; Training</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
      <button class="add-btn hidden" id="add-personnel-btn">+ Add</button>
      <button class="add-btn hidden" id="add-training-btn">+ Log Training</button>
    </div>
  </header>

  <div class="sub-tab-bar">
    <button class="sub-tab active" id="tab-personnel-btn">Personnel</button>
    <button class="sub-tab" id="tab-training-btn">Training Log</button>
    <button class="sub-tab" id="tab-matrix-btn">Matrix</button>
  </div>

  <!-- Main list area (slides out when form opens) -->
  <div class="masters-content" id="people-list-area">

    <!-- Personnel Panel -->
    <div id="panel-personnel">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Designation</th>
              <th>Department</th>
              <th>Phone</th>
            </tr>
          </thead>
          <tbody id="personnel-tbody">
            <tr><td colspan="5" class="td-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Training Panel -->
    <div id="panel-training" class="hidden">
      <div class="filter-bar">
        <label>Status</label>
        <select id="training-status-filter">
          <option value="all">All</option>
          <option value="Completed">Completed</option>
          <option value="Planned">Planned</option>
        </select>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Topic</th>
              <th>Trainer</th>
              <th>Participants</th>
              <th>Eval Score</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="training-tbody">
            <tr><td colspan="6" class="td-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Training Matrix Panel -->
    <div id="panel-matrix" class="hidden">
      <div id="matrix-wrap" style="overflow-x:auto;padding:var(--space-4);">
        <p class="text-muted" style="padding:var(--space-8);text-align:center;">Loading matrix…</p>
      </div>
    </div>

  </div>

  <!-- Personnel Form Panel -->
  <div class="form-panel" id="personnel-form-panel">
    <div class="form-header">
      <button class="back-btn" id="personnel-form-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="form-title" id="personnel-form-title">Add Personnel</span>
    </div>
    <div class="form-body">
      <input type="hidden" id="pf-person-id">
      <div class="field-group">
        <label>Full Name</label>
        <input type="text" id="pf-name" placeholder="e.g. Ramesh Kumar">
      </div>
      <div class="field-group">
        <label>Designation / Role</label>
        <select id="pf-role">
          <option value="">— select —</option>
          <option value="operator">Operator</option>
          <option value="supervisor">Supervisor</option>
          <option value="store">Store</option>
          <option value="qmr">QMR</option>
          <option value="hr">HR</option>
          <option value="director">Director</option>
          <option value="technician">Technician</option>
          <option value="helper">Helper</option>
        </select>
      </div>
      <div class="field-group">
        <label>Department</label>
        <select id="pf-department">
          <option value="">— select —</option>
          <option value="Production">Production</option>
          <option value="Quality">Quality</option>
          <option value="Store">Store</option>
          <option value="Maintenance">Maintenance</option>
          <option value="HR">HR</option>
          <option value="Management">Management</option>
        </select>
      </div>
      <div class="field-group">
        <label>Phone</label>
        <input type="tel" id="pf-phone" placeholder="10-digit mobile">
      </div>
      <div class="field-group">
        <label>Qualification</label>
        <input type="text" id="pf-qualification" placeholder="e.g. ITI, B.E., 10th Pass">
      </div>
      <div class="field-group">
        <label>Date Joined</label>
        <input type="date" id="pf-date-joined">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="personnel-submit-btn">Save</button>
    </div>
  </div>

  <!-- Training Form Panel -->
  <div class="form-panel" id="training-form-panel">
    <div class="form-header">
      <button class="back-btn" id="training-form-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="form-title">Log Training</span>
    </div>
    <div class="form-body">
      <div class="field-group">
        <label>Topic</label>
        <select id="tf-topic"><option value="">— select —</option></select>
      </div>
      <div class="field-group">
        <label>Date</label>
        <input type="date" id="tf-date">
      </div>
      <div class="field-group">
        <label>Trainer</label>
        <input type="text" id="tf-trainer" placeholder="Trainer name / external agency">
      </div>
      <div class="field-group">
        <label>Participants</label>
        <select id="tf-participants" multiple size="5" style="width:100%;min-height:80px;">
          <option value="" disabled>Loading personnel…</option>
        </select>
        <small style="color:var(--color-muted)">Hold Ctrl / Cmd to select multiple</small>
      </div>
      <div class="field-group">
        <label>Method</label>
        <select id="tf-method">
          <option value="Classroom">Classroom</option>
          <option value="On-the-Job">On-the-Job</option>
          <option value="Online">Online</option>
          <option value="Observation">Observation</option>
        </select>
      </div>
      <div class="field-group">
        <label>Eval Score (optional)</label>
        <input type="number" id="tf-score" placeholder="e.g. 85" min="0" max="100">
      </div>
      <div class="field-group">
        <label>Status</label>
        <select id="tf-status">
          <option value="Completed">Completed</option>
          <option value="Planned">Planned</option>
        </select>
      </div>
      <div class="field-group">
        <label>Remarks</label>
        <textarea id="tf-remarks" rows="2"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="training-submit-btn">Save</button>
    </div>
  </div>

  <div class="spinner-overlay hidden" id="spinner"><div class="spinner"></div></div>
  <div class="toast" id="toast"></div>

  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/lang.js" defer></script>
  <script src="js/people.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      await Api.init();
      await People.init();
    });
  </script>
</body>
</html>
