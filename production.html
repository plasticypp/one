<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#EA580C">
  <title>YPP ERP — Production</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/masters.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-flex">
      <button class="back-btn" id="back-to-app"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="header-title" data-i18n="page.production">Production</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <!-- Tab Bar -->
  <div class="sub-tab-bar">
    <button class="sub-tab active" data-tab="batches">Batch Orders</button>
    <button class="sub-tab" data-tab="fg">Finished Goods</button>
    <button class="sub-tab" data-tab="params">Params Log</button>
  </div>

  <!-- Main Content -->
  <div id="main-content">

    <!-- Batch Orders Tab -->
    <div id="tab-batches" class="tab-content">
      <div class="filter-bar">
        <select id="filter-status">
          <option value="all">All Status</option>
          <option value="Planned">Planned</option>
          <option value="Closed">Closed</option>
        </select>
        <button class="btn-apply" onclick="Production.loadBatches()">Apply</button>
        <span class="filter-spacer"></span>
        <button class="btn-primary" id="btn-new-batch">+ New Batch</button>
      </div>
      <div class="prod-table-wrap">
        <table class="prod-table">
          <thead>
            <tr>
              <th>Batch ID</th>
              <th>Date</th>
              <th>Product</th>
              <th>Machine</th>
              <th>Planned Qty</th>
              <th>Actual Qty</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="batch-tbody">
            <tr><td colspan="8" class="td-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Finished Goods Tab -->
    <div id="tab-fg" class="tab-content hidden">
      <div class="prod-table-wrap" style="padding-top:16px;">
        <table class="prod-table">
          <thead>
            <tr>
              <th>FG ID</th>
              <th>Batch</th>
              <th>Product</th>
              <th>Qty</th>
              <th>Produced Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="fg-tbody">
            <tr><td colspan="6" class="td-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Production Params Log Tab -->
    <div id="tab-params" class="tab-content hidden">
      <div class="filter-bar">
        <select id="filter-params-batch">
          <option value="">All Batches</option>
        </select>
        <button class="btn-apply" onclick="Production.loadParamsLog()">Apply</button>
        <span class="filter-spacer"></span>
        <button class="btn-primary" id="btn-log-params">+ Log Params</button>
      </div>
      <div class="prod-table-wrap">
        <table class="prod-table">
          <thead>
            <tr>
              <th>Log ID</th><th>Batch</th><th>Time</th><th>Zone1 (°C)</th><th>Zone2 (°C)</th><th>Blow P (bar)</th><th>Cycle (s)</th><th>Parison (g)</th><th>Operator</th>
            </tr>
          </thead>
          <tbody id="params-tbody">
            <tr><td colspan="9" class="td-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Params Log Form Panel -->
  <div class="form-panel" id="params-panel">
    <div class="form-header">
      <button class="back-btn" onclick="Production.slideParamsPanelOut()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <span class="form-title">Log Production Parameters</span>
    </div>
    <div class="form-body">
      <div class="field-group">
        <label>Batch *</label>
        <select id="params-batch-sel"><option value="">— select batch —</option></select>
      </div>
      <div class="field-group">
        <label>Zone 1 Temp (°C)</label>
        <input type="number" id="params-zone1" placeholder="e.g. 185" step="0.1">
      </div>
      <div class="field-group">
        <label>Zone 2 Temp (°C)</label>
        <input type="number" id="params-zone2" placeholder="e.g. 190" step="0.1">
      </div>
      <div class="field-group">
        <label>Blow Pressure (bar)</label>
        <input type="number" id="params-blow" placeholder="e.g. 6.5" step="0.1">
      </div>
      <div class="field-group">
        <label>Cycle Time (sec)</label>
        <input type="number" id="params-cycle" placeholder="e.g. 45" step="0.1">
      </div>
      <div class="field-group">
        <label>Parison Weight (g)</label>
        <input type="number" id="params-parison" placeholder="e.g. 120" step="0.1">
      </div>
      <div class="field-group">
        <label>Remarks</label>
        <input type="text" id="params-remarks" placeholder="Optional">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="Production.submitParamsLog()">Save Log</button>
    </div>
  </div>

  <!-- New Batch Form Panel (slide-in) -->
  <div class="form-panel" id="form-panel">
    <div class="form-header">
      <button class="back-btn" id="form-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="form-title" id="form-title">New Batch Order</span>
    </div>
    <div class="form-body">
      <div class="field-group">
        <label>Product</label>
        <select id="field-product"><option value="">— select —</option></select>
      </div>
      <div class="field-group">
        <label>Machine</label>
        <select id="field-machine"><option value="">— select —</option></select>
      </div>
      <div class="field-group">
        <label>Operator</label>
        <select id="field-operator"><option value="">— select —</option></select>
      </div>
      <div class="field-group">
        <label>Shift</label>
        <select id="field-shift">
          <option value="A">A (06:00–14:00)</option>
          <option value="B">B (14:00–22:00)</option>
          <option value="C">C (22:00–06:00)</option>
        </select>
      </div>
      <div class="field-group">
        <label>RM Lot No (from GRN)</label>
        <input type="text" id="field-rm-lot" placeholder="e.g. LOT-2024-001">
      </div>
      <div class="field-group">
        <label>Planned Qty</label>
        <input type="number" id="field-planned-qty" min="1">
      </div>
      <div class="field-group">
        <label>Start Time</label>
        <input type="datetime-local" id="field-start-time">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="Production.submitBatch()">Save Batch</button>
    </div>
  </div>

  <!-- Close Batch Panel (slide-in) -->
  <div class="form-panel" id="close-panel">
    <div class="form-header">
      <button class="back-btn" id="close-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="form-title">Close Batch</span>
    </div>
    <div class="form-body">
      <div class="field-group"><label>Batch ID</label><input type="text" id="close-batch-id-display" disabled></div>
      <div class="field-group"><label>Planned Qty</label><input type="number" id="close-planned-qty" disabled></div>
      <div class="field-group"><label>Actual Qty Produced *</label><input type="number" id="close-actual-qty" min="1" required></div>
      <div class="field-group"><label>Rejections (units)</label><input type="number" id="close-rejections" value="0" min="0"></div>
      <div class="field-group">
        <label>Rejection Reason</label>
        <select id="close-rejection-reason">
          <option value="">— none —</option>
          <option value="Flash">Flash / Burrs</option>
          <option value="Leak">Leak / Pinhole</option>
          <option value="Dimension OOS">Dimension out of spec</option>
          <option value="Colour">Colour variation</option>
          <option value="Contamination">Contamination / Black specks</option>
          <option value="Warpage">Warpage / Distortion</option>
          <option value="Short Shot">Short Shot</option>
          <option value="Neck Defect">Neck / Thread defect</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field-group"><label>Downtime (minutes)</label><input type="number" id="close-downtime-min" value="0" min="0"></div>
      <div class="field-group">
        <label>Downtime Reason</label>
        <select id="close-downtime-reason">
          <option value="">— none —</option>
          <option value="Mould Change">Mould Change</option>
          <option value="Breakdown">Breakdown</option>
          <option value="Power Failure">Power Failure</option>
          <option value="Material Shortage">Material Shortage</option>
          <option value="Colour Change">Colour Change / Purging</option>
          <option value="PM">Planned Maintenance</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field-group"><label>End Time</label><input type="datetime-local" id="close-end-time"></div>
      <div class="field-group"><label>Notes</label><input type="text" id="close-notes" placeholder="Optional"></div>
      <div id="close-qc-warning" style="display:none;background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:10px;margin:8px 0;font-size:0.875rem;"></div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="Production.submitClose()">Confirm Close</button>
    </div>
  </div>

  <!-- Detail Panel (slide-in) -->
  <div class="form-panel" id="detail-panel">
    <div class="form-header">
      <button class="back-btn" id="detail-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="form-title">Batch Detail</span>
    </div>
    <div class="form-body" id="detail-body"></div>
    <div class="form-actions" id="detail-actions"></div>
  </div>

  <!-- Spinner -->
  <div class="spinner-overlay hidden" id="spinner">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/lang.js" defer></script>
  <script src="js/production.js" defer></script>
  <script>
  window.addEventListener('DOMContentLoaded', () => {
    (async () => {
      await Api.init();
      await Production.init();
    })();
  });
  </script>
</body>
</html>
