<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1565C0">
  <title>YPP ERP — Production</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/masters.css">
  <style>
    .prod-tab-bar {
      display: flex;
      gap: 0;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 16px;
    }
    .prod-tab {
      padding: 12px 20px;
      border: none;
      background: none;
      font-size: 0.95rem;
      color: #757575;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      font-family: inherit;
    }
    .prod-tab.active {
      color: #1565C0;
      border-bottom-color: #1565C0;
      font-weight: 600;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: inherit;
      background: #fff;
    }
    .filter-bar .btn-apply {
      padding: 6px 14px;
      background: #1565C0;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .prod-table-wrap {
      overflow-x: auto;
      padding: 0 16px 16px;
    }
    .prod-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      margin-top: 8px;
    }
    .prod-table th {
      text-align: left;
      padding: 10px 12px;
      background: #f5f5f5;
      color: #424242;
      font-weight: 600;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap;
    }
    .prod-table td {
      padding: 9px 12px;
      border-bottom: 1px solid #f0f0f0;
      color: #212121;
    }
    .prod-table tr:hover td {
      background: #f9f9f9;
    }

    .status-badge.planned {
      background: #e3f2fd;
      color: #1565C0;
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 0.8rem;
      background: #1565C0;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-sm:hover {
      background: #0d47a1;
    }

    .tab-content { flex: 1; overflow-y: auto; }
    .tab-content.hidden { display: none; }

    .new-batch-bar {
      padding: 12px 16px;
      display: flex;
      justify-content: flex-end;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="back-btn" id="back-to-app" style="color:#fff;font-size:1.1rem;">←</button>
      <span class="header-title">Production</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <!-- Tab Bar -->
  <div class="prod-tab-bar">
    <button class="prod-tab active" data-tab="batches">Batch Orders</button>
    <button class="prod-tab" data-tab="fg">Finished Goods</button>
  </div>

  <!-- Main Content -->
  <div id="main-content" style="display:flex;flex-direction:column;height:calc(100vh - 112px);overflow:hidden;">

    <!-- Batch Orders Tab -->
    <div id="tab-batches" class="tab-content">
      <div class="filter-bar">
        <select id="filter-status">
          <option value="all">All Status</option>
          <option value="Planned">Planned</option>
          <option value="Closed">Closed</option>
        </select>
        <button class="btn-apply" onclick="Production.loadBatches()">Apply</button>
      </div>
      <div class="new-batch-bar">
        <button class="btn-primary" id="btn-new-batch">+ New Batch</button>
      </div>
      <div class="prod-table-wrap">
        <table class="prod-table">
          <thead>
            <tr>
              <th>Batch ID</th>
              <th>Date</th>
              <th>Product</th>
              <th>Machine</th>
              <th>Planned Qty</th>
              <th>Actual Qty</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="batch-tbody">
            <tr><td colspan="8" style="text-align:center;color:#757575;padding:24px;">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Finished Goods Tab -->
    <div id="tab-fg" class="tab-content hidden">
      <div class="prod-table-wrap" style="padding-top:16px;">
        <table class="prod-table">
          <thead>
            <tr>
              <th>FG ID</th>
              <th>Batch</th>
              <th>Product</th>
              <th>Qty</th>
              <th>Produced Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="fg-tbody">
            <tr><td colspan="6" style="text-align:center;color:#757575;padding:24px;">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Form Panel (slide-in) -->
  <div class="form-panel" id="form-panel">
    <div class="form-header">
      <button class="back-btn" id="form-back">← Back</button>
      <span class="form-title" id="form-title">New Batch Order</span>
    </div>
    <div class="form-body">
      <div class="field-group">
        <label>Product</label>
        <select id="field-product"><option value="">— select —</option></select>
      </div>
      <div class="field-group">
        <label>Machine</label>
        <select id="field-machine"><option value="">— select —</option></select>
      </div>
      <div class="field-group">
        <label>Operator</label>
        <input type="text" id="field-operator" placeholder="Operator name">
      </div>
      <div class="field-group">
        <label>Planned Qty</label>
        <input type="number" id="field-planned-qty" min="1">
      </div>
      <div class="field-group">
        <label>Start Time</label>
        <input type="datetime-local" id="field-start-time">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="Production.submitBatch()">Save Batch</button>
    </div>
  </div>

  <!-- Spinner -->
  <div class="spinner-overlay hidden" id="spinner">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/production.js"></script>
  <script>
    (async () => {
      await Api.init();
      await Production.init();
    })();
  </script>
</body>
</html>
