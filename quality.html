<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#EA580C">
  <title>YPP ERP — Quality / IPQC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/masters.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-flex">
      <button class="back-btn" id="back-to-app"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="header-title" data-i18n="page.quality">Quality / IPQC</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <!-- Tab Bar -->
  <div class="sub-tab-bar">
    <button class="sub-tab active" data-tab="summary">Summary</button>
    <button class="sub-tab" data-tab="iqc">IQC</button>
    <button class="sub-tab" data-tab="ipc">IPC</button>
    <button class="sub-tab" data-tab="oqc">OQC</button>
  </div>

  <!-- Main Content -->
  <div id="main-content">

    <!-- Summary Tab -->
    <div id="tab-summary" class="tab-content">
      <div id="summary-grid" class="summary-grid">
        <p class="empty-msg">Loading…</p>
      </div>
    </div>

    <!-- IQC Tab -->
    <div id="tab-iqc" class="tab-content hidden">
      <div class="filter-bar">
        <select id="filter-batch-iqc"><option value="">All Batches</option></select>
        <span class="filter-spacer"></span>
        <button class="btn-primary" id="btn-new-check-iqc">+ New Check</button>
      </div>
      <div class="checks-table-wrap">
        <table class="checks-table">
          <thead><tr>
            <th>Date</th><th>Batch</th><th>Inspector</th>
            <th>Params</th><th>NG</th><th>Result</th>
          </tr></thead>
          <tbody id="checks-tbody-iqc">
            <tr><td colspan="8" class="td-loading">Select a batch to view checks</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- IPC Tab -->
    <div id="tab-ipc" class="tab-content hidden">
      <div class="filter-bar">
        <select id="filter-batch-ipc"><option value="">All Batches</option></select>
        <span class="filter-spacer"></span>
        <button class="btn-primary" id="btn-new-check-ipc">+ New Check</button>
      </div>
      <div class="checks-table-wrap">
        <table class="checks-table">
          <thead><tr>
            <th>Date</th><th>Batch</th><th>Inspector</th>
            <th>Params</th><th>NG</th><th>Result</th>
          </tr></thead>
          <tbody id="checks-tbody-ipc">
            <tr><td colspan="8" class="td-loading">Select a batch to view checks</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- OQC Tab -->
    <div id="tab-oqc" class="tab-content hidden">
      <div class="filter-bar">
        <select id="filter-batch-oqc"><option value="">All Batches</option></select>
        <span class="filter-spacer"></span>
        <button class="btn-primary" id="btn-new-check-oqc">+ New Check</button>
      </div>
      <div class="checks-table-wrap">
        <table class="checks-table">
          <thead><tr>
            <th>Date</th><th>Batch</th><th>Inspector</th>
            <th>Params</th><th>NG</th><th>Result</th>
          </tr></thead>
          <tbody id="checks-tbody-oqc">
            <tr><td colspan="8" class="td-loading">Select a batch to view checks</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Form Panel (slide-in) -->
  <div class="form-panel" id="form-panel">
    <div class="form-header">
      <button class="back-btn" id="form-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="form-title" id="form-title">New Quality Check</span>
    </div>
    <div class="form-body" id="form-body-top">
      <div class="field-group">
        <label>Check Date</label>
        <input type="date" id="field-check-date">
      </div>
      <div class="field-group">
        <label>Batch ID *</label>
        <select id="field-batch"><option value="">— select —</option></select>
        <div class="field-error" id="err-batch"></div>
      </div>
      <div class="field-group">
        <label>Inspector</label>
        <input type="text" id="field-inspector" placeholder="Inspector name">
      </div>
    </div>
    <div id="param-sheet-body" style="flex:1;overflow-y:auto;padding:0 var(--space-4);">
      <p style="font-size:var(--text-sm);color:var(--color-text-muted);padding:var(--space-4) 0;">Select a batch to load parameters.</p>
    </div>
    <div class="form-actions">
      <div class="field-error" id="err-sheet"></div>
      <button class="btn btn-primary btn-full" onclick="Quality.submitCheckSheet()">Save Check Sheet</button>
    </div>
  </div>

  <!-- Detail Panel (slide-in) -->
  <div class="form-panel" id="detail-panel">
    <div class="form-header">
      <button class="back-btn" id="detail-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="form-title">Check Detail</span>
    </div>
    <div class="form-body" id="detail-body"></div>
    <div class="form-actions" id="detail-actions"></div>
  </div>

  <!-- Spinner -->
  <div class="spinner-overlay hidden" id="spinner">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/lang.js" defer></script>
  <script src="js/quality.js" defer></script>
  <script>
  window.addEventListener('DOMContentLoaded', () => {
    (async () => {
      await Api.init();
      await Quality.init();
    })();
  });
  </script>
</body>
</html>
