<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#EA580C">
  <title>YPP ERP — Quality / IPQC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/masters.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-flex">
      <button class="back-btn" id="back-to-app"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="header-title">Quality / IPQC</span>
    </div>
    <div class="header-actions">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <!-- Tab Bar -->
  <div class="sub-tab-bar">
    <button class="sub-tab active" data-tab="summary">Summary</button>
    <button class="sub-tab" data-tab="checks">Check Log</button>
  </div>

  <!-- Main Content -->
  <div id="main-content">

    <!-- Summary Tab -->
    <div id="tab-summary" class="tab-content">
      <div id="summary-grid" class="summary-grid">
        <p class="empty-msg">Loading…</p>
      </div>
    </div>

    <!-- Check Log Tab -->
    <div id="tab-checks" class="tab-content hidden">
      <div class="filter-bar">
        <select id="filter-batch"><option value="">All Batches</option></select>
      </div>
      <div class="new-check-bar">
        <button class="btn-primary" id="btn-new-check">+ New Check</button>
      </div>
      <div class="checks-table-wrap">
        <table class="checks-table">
          <thead>
            <tr>
              <th>Check ID</th>
              <th>Batch</th>
              <th>Parameter</th>
              <th>Spec Min</th>
              <th>Spec Max</th>
              <th>Actual</th>
              <th>Result</th>
              <th>Remarks</th>
            </tr>
          </thead>
          <tbody id="checks-tbody">
            <tr><td colspan="8" class="td-loading">Select a batch to view checks</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Form Panel (slide-in) -->
  <div class="form-panel" id="form-panel">
    <div class="form-header">
      <button class="back-btn" id="form-back">← Back</button>
      <span class="form-title" id="form-title">New Quality Check</span>
    </div>
    <div class="form-body">
      <div class="field-group">
        <label>Check Date</label>
        <input type="date" id="field-check-date">
      </div>
      <div class="field-group">
        <label>Batch ID</label>
        <select id="field-batch"><option value="">— select —</option></select>
      </div>
      <div class="field-group">
        <label>Inspector</label>
        <input type="text" id="field-inspector" placeholder="Inspector name">
      </div>
      <div class="field-group">
        <label>Parameter</label>
        <select id="field-parameter">
          <option value="Wall Thickness">Wall Thickness</option>
          <option value="Weight">Weight</option>
          <option value="Leak Test">Leak Test</option>
          <option value="MFI">MFI</option>
          <option value="Dimension">Dimension</option>
        </select>
      </div>
      <div class="field-group">
        <label>Spec Min</label>
        <input type="number" id="field-spec-min" step="any" placeholder="0">
      </div>
      <div class="field-group">
        <label>Spec Max</label>
        <input type="number" id="field-spec-max" step="any" placeholder="0">
      </div>
      <div class="field-group">
        <label>Actual Value</label>
        <input type="number" id="field-actual" step="any">
      </div>
      <div class="field-group">
        <label>Remarks</label>
        <input type="text" id="field-remarks" placeholder="Optional">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="Quality.submitCheck()">Save Check</button>
    </div>
  </div>

  <!-- Spinner -->
  <div class="spinner-overlay hidden" id="spinner">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/quality.js"></script>
  <script>
    (async () => {
      await Api.init();
      await Quality.init();
    })();
  </script>
</body>
</html>
